name: Build iOS
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Ren'Py
        run: |
          curl -L https://renpy.org -o renpy.tar.bz2
          tar -xjf renpy.tar.bz2

      - name: Build iOS App
        run: |
          ./renpy-8.1.1-sdk/renpy.sh . ios deploy . --signing-group "NONE"
